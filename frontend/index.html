<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SignalSense — From Equations to Intuition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..600,0&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

  :root{
    --warm-white:#FBF9F6;
    --cream:#F3EDE5;
    --lavender:#E9E1F1;
    --violet:#7C6896;
    --violet-deep:#5B4A75;
    --blue:#A9C6D8;
    --indigo:#2E2740;
    --ink:#2A2438;
    --ink-soft:#6B6378;
    --line:rgba(46,39,64,0.08);
    --surface:#FFFFFF;
    --surface-raised:#FDFCFA;
    --radius-lg:28px;
    --radius-md:18px;
    --radius-sm:12px;
    --ease:cubic-bezier(.22,.61,.36,1);
    --shadow-soft:0 2px 24px rgba(46,39,64,0.06);
    --shadow-lift:0 12px 40px rgba(46,39,64,0.10);
  }

  [data-theme="dark"]{
    --warm-white:#15131D;
    --cream:#1C1928;
    --lavender:#241F33;
    --violet:#B6A2D4;
    --violet-deep:#9B86C4;
    --blue:#8FB3CC;
    --indigo:#EFEAF6;
    --ink:#EFEAF6;
    --ink-soft:#A79FBC;
    --line:rgba(239,234,246,0.09);
    --surface:#1A1726;
    --surface-raised:#201C2E;
    --shadow-soft:0 2px 24px rgba(0,0,0,0.25);
    --shadow-lift:0 16px 48px rgba(0,0,0,0.4);
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background:var(--warm-white);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    font-weight:400;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    transition:background .6s var(--ease), color .6s var(--ease);
  }

  ::selection{ background:var(--lavender); color:var(--violet-deep); }

  .serif{ font-family:'Fraunces', serif; }

  /* ---------- App shell ---------- */
  .app{
    position:relative;
    height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    transition:height .01s, overflow .01s;
  }
  .app.chat-active{
    height:auto;
    min-height:100vh;
    overflow:visible;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    position:absolute;
    top:0;
    left:0;
    right:0;
    z-index:40;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:22px 36px;
    background:transparent;
  }
  .app.chat-active .topbar{
    position:sticky;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:default;
  }
  .brand svg{ width:26px; height:26px; }
  .brand-name{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:18px;
    letter-spacing:0.01em;
    color:var(--ink);
    text-shadow:0 1px 16px rgba(255,255,255,0.55), 0 1px 3px rgba(255,255,255,0.4);
  }
  [data-theme="dark"] .brand-name{
    text-shadow:0 1px 16px rgba(0,0,0,0.55), 0 1px 3px rgba(0,0,0,0.4);
  }
  .topbar-actions{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .theme-toggle{
    width:38px; height:38px;
    border-radius:50%;
    border:1px solid var(--line);
    background:var(--surface);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:transform .35s var(--ease), border-color .3s;
    color:var(--ink-soft);
  }
  .theme-toggle:hover{ transform:rotate(20deg); border-color:var(--violet); color:var(--violet); }
  .theme-toggle svg{ width:17px; height:17px; }

  /* ---------- Hero / Fluid canvas ---------- */
  .hero-wrap{
    position:relative;
    width:100%;
    flex:1 1 auto;
    min-height:0;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:flex-grow 1.1s var(--ease), flex-basis 1.1s var(--ease), min-height 1.1s var(--ease);
  }
  .hero-wrap.shrunk{
    flex:0 0 124px;
    min-height:124px;
  }

  .fluid-stage{
    position:absolute;
    inset:0;
    overflow:hidden;
    border-radius:0;
    transition:border-radius 1.1s var(--ease);
  }
  .hero-wrap.shrunk .fluid-stage{
    border-radius:0 0 32px 32px;
  }

  #fluidCanvas{
    width:100%;
    height:100%;
    display:block;
    transition:filter 1.1s var(--ease), opacity 1.1s var(--ease);
  }
  .hero-wrap.shrunk #fluidCanvas{
    filter:blur(18px) saturate(108%);
    opacity:0.75;
  }

  .fluid-veil{
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom, transparent 0%, transparent 62%, var(--warm-white) 96%);
    pointer-events:none;
    transition:opacity 1.1s var(--ease);
  }
  .hero-wrap.shrunk .fluid-veil{
    opacity:0;
  }
  .fluid-veil-edge{
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom, transparent 60%, var(--warm-white) 100%);
    pointer-events:none;
    opacity:0;
    transition:opacity 1.1s var(--ease);
  }
  .hero-wrap.shrunk .fluid-veil-edge{ opacity:1; }

  .hero-content{
    position:relative;
    z-index:5;
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
    transform:translateY(0);
    opacity:1;
    transition:opacity .7s var(--ease), transform .9s var(--ease);
    pointer-events:none;
  }
  .hero-wrap.shrunk .hero-content{
    opacity:0;
    transform:translateY(-18px);
    pointer-events:none;
  }

  .hero-title{
    font-family:'Fraunces', serif;
    font-weight:400;
    font-size:clamp(48px, 8vw, 96px);
    letter-spacing:-0.02em;
    color:var(--ink);
    margin:0;
    line-height:1;
    text-shadow:0 1px 40px rgba(255,255,255,0.4);
  }
  [data-theme="dark"] .hero-title{ text-shadow:0 1px 40px rgba(0,0,0,0.4); }

  .hero-tagline{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:300;
    font-size:clamp(17px, 2vw, 22px);
    color:var(--ink-soft);
    margin:0;
    letter-spacing:0.01em;
  }

  /* mini wordmark that appears when shrunk, centered over the ambient band */
  .mini-mark{
    position:absolute;
    z-index:6;
    left:50%;
    bottom:18px;
    transform:translate(-50%, 10px);
    display:flex;
    align-items:center;
    gap:9px;
    opacity:0;
    transition:opacity .8s var(--ease) .3s, transform .8s var(--ease) .3s;
    pointer-events:none;
  }
  .hero-wrap.shrunk .mini-mark{
    opacity:1;
    transform:translate(-50%, 0);
  }
  .mini-mark svg{ width:18px;height:18px; }
  .mini-mark span{
    font-family:'Fraunces', serif;
    font-size:14px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }

  /* ---------- Main column ---------- */
  .main{
    flex:0 0 auto;
    width:100%;
    max-width:760px;
    margin:0 auto;
    padding:0 28px 0;
    display:flex;
    flex-direction:column;
  }
  .app.chat-active .main{
    flex:1;
    padding:0 28px 220px;
  }

  .suggestions{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-top:28px;
  }
  .suggestion-chip{
    font-family:'Inter', sans-serif;
    font-size:13.5px;
    color:var(--violet-deep);
    background:var(--surface);
    border:1px solid var(--line);
    padding:10px 18px;
    border-radius:999px;
    cursor:pointer;
    transition:all .35s var(--ease);
  }
  .suggestion-chip:hover{
    border-color:var(--violet);
    background:var(--lavender);
    transform:translateY(-1px);
  }

  /* ---------- Chat thread ---------- */
  .thread{
    display:flex;
    flex-direction:column;
    gap:36px;
    padding-top:34px;
  }

  .msg{
    display:flex;
    flex-direction:column;
    gap:10px;
    animation:rise .6s var(--ease);
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .msg.user{ align-items:flex-end; }
  .msg.user .bubble{
    background:var(--lavender);
    color:var(--ink);
    padding:13px 20px;
    border-radius:20px 20px 4px 20px;
    max-width:78%;
    font-size:15.5px;
    line-height:1.55;
  }

  .msg.assistant{ align-items:stretch; }
  .assistant-label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--violet);
    font-weight:500;
  }
  .assistant-label svg{ width:13px; height:13px; }

  .assistant-body{
    font-size:16.5px;
    line-height:1.85;
    color:var(--ink);
    letter-spacing:0.001em;
  }
  .assistant-body p{ margin:0 0 16px; }
  .assistant-body p:last-child{ margin-bottom:0; }
  .assistant-body .eq{
    font-family:'Fraunces', serif;
    font-style:italic;
    color:var(--violet-deep);
  }

  .section-tag{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    letter-spacing:0.09em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:22px 0 10px;
    font-weight:500;
  }
  .section-tag::before{
    content:'';
    width:14px; height:1px;
    background:var(--violet);
    display:inline-block;
  }

  /* ---------- Signal Playground ---------- */
  .playground{
    margin-top:30px;
    border-radius:var(--radius-lg);
    background:var(--surface-raised);
    border:1px solid var(--line);
    box-shadow:var(--shadow-soft);
    padding:34px 36px 38px;
    animation:rise .7s var(--ease);
  }
  .playground-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:26px;
    flex-wrap:wrap;
    gap:8px;
  }
  .playground-title{
    font-family:'Fraunces', serif;
    font-size:23px;
    font-weight:500;
    color:var(--ink);
    display:flex;
    align-items:center;
    gap:9px;
  }
  .playground-title svg{ width:18px; height:18px; color:var(--violet); }
  .playground-sub{
    font-size:12.5px;
    color:var(--ink-soft);
    font-style:italic;
    font-family:'Fraunces', serif;
  }

  .pg-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
  }
  @media (max-width:640px){ .pg-grid{ grid-template-columns:1fr; } }

  .pg-panel{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-md);
    padding:20px 22px 22px;
  }
  .pg-panel-label{
    font-size:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:14px;
    display:flex;
    align-items:center;
    gap:7px;
  }
  .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--violet);
  }
  .dot.blue{ background:var(--blue); }

  canvas.sig-canvas{
    width:100%;
    height:120px;
    display:block;
    border-radius:8px;
  }

  .pg-transform{
    grid-column:1 / -1;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-md);
    padding:20px 22px;
    text-align:center;
  }
  .pg-transform-eq{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:19px;
    color:var(--violet-deep);
  }

  .pg-intuition{
    grid-column:1 / -1;
    padding:22px 4px 2px;
    border-top:1px solid var(--line);
    margin-top:4px;
  }
  .pg-intuition-label{
    font-size:11px;
    letter-spacing:0.09em;
    text-transform:uppercase;
    color:var(--violet);
    font-weight:500;
    margin-bottom:8px;
  }
  .pg-intuition-text{
    font-size:15px;
    line-height:1.75;
    color:var(--ink-soft);
  }

  /* ---------- Composer ---------- */
  .composer-dock{
    position:fixed;
    left:0; right:0; bottom:0;
    z-index:50;
    display:flex;
    justify-content:center;
    padding:0 28px 28px;
    background:linear-gradient(to top, var(--warm-white) 55%, transparent);
    pointer-events:none;
  }
  .composer{
    pointer-events:auto;
    width:100%;
    max-width:760px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .pref-row{
    display:flex;
    gap:9px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .pref-pill{
    display:flex;
    align-items:center;
    gap:7px;
    padding:8px 16px 8px 12px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--surface);
    cursor:pointer;
    font-size:13px;
    color:var(--ink-soft);
    transition:all .3s var(--ease);
    user-select:none;
  }
  .pref-pill .check{
    width:15px;height:15px;
    border-radius:5px;
    border:1.4px solid var(--ink-soft);
    display:flex;align-items:center;justify-content:center;
    transition:all .25s var(--ease);
    flex-shrink:0;
  }
  .pref-pill .check svg{
    width:9px;height:9px;
    opacity:0;
    transform:scale(0.5);
    transition:all .2s var(--ease);
  }
  .pref-pill.active{
    border-color:var(--violet);
    background:var(--lavender);
    color:var(--violet-deep);
  }
  .pref-pill.active .check{
    background:var(--violet);
    border-color:var(--violet);
  }
  .pref-pill.active .check svg{ opacity:1; transform:scale(1); color:#fff; }
  .pref-pill:hover{ border-color:var(--violet); }

  .input-shell{
    display:flex;
    align-items:flex-end;
    gap:10px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:26px;
    padding:8px 8px 8px 22px;
    box-shadow:var(--shadow-lift);
    transition:border-color .3s var(--ease);
  }
  .input-shell:focus-within{ border-color:var(--violet); }

  .input-shell textarea{
    flex:1;
    border:none;
    outline:none;
    resize:none;
    background:transparent;
    font-family:'Inter', sans-serif;
    font-size:15.5px;
    color:var(--ink);
    line-height:1.5;
    padding:10px 0;
    max-height:160px;
  }
  .input-shell textarea::placeholder{ color:var(--ink-soft); opacity:0.7; }

  .send-btn{
    width:42px; height:42px;
    border-radius:50%;
    border:none;
    background:var(--violet-deep);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:all .3s var(--ease);
  }
  .send-btn:hover{ background:var(--violet); transform:scale(1.05); }
  .send-btn svg{ width:17px; height:17px; }

  .composer-foot{
    text-align:center;
    font-size:11px;
    color:var(--ink-soft);
    opacity:0.6;
    letter-spacing:0.01em;
  }

  /* typing dots */
  .typing{
    display:flex; gap:5px; align-items:center; padding:4px 0;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:var(--violet);
    opacity:0.4;
    animation:pulse 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay:.15s; }
  .typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes pulse{
    0%,100%{ opacity:0.25; transform:scale(0.85); }
    50%{ opacity:0.9; transform:scale(1.1); }
  }

  @media (max-width:640px){
    .topbar{ padding:18px 20px; }
    .main{ padding:0 18px 220px; }
    .playground{ padding:26px 20px 28px; }
    .composer-dock{ padding:0 16px 18px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
  }
</style>
</head>
<body>

<div class="app" id="appShell">

  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 16C5 16 5 7 8 7C11 7 11 25 14 25C17 25 17 7 20 7C23 7 23 16 26 16" stroke="url(#g1)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <defs>
          <linearGradient id="g1" x1="2" y1="16" x2="30" y2="16" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#A9C6D8"/>
            <stop offset="50%" stop-color="#7C6896"/>
            <stop offset="100%" stop-color="#5B4A75"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="brand-name">SignalSense</span>
    </div>
    <div class="topbar-actions">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4.5"/>
          <path d="M12 2.5v2.2M12 19.3v2.2M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="hero-wrap" id="heroWrap">
    <div class="fluid-stage">
      <canvas id="fluidCanvas"></canvas>
      <div class="fluid-veil"></div>
      <div class="fluid-veil-edge"></div>
    </div>
    <div class="hero-content">
      <h1 class="hero-title">SignalSense</h1>
      <p class="hero-tagline">From Equations to Intuition.</p>
    </div>
    <div class="mini-mark">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 16C5 16 5 7 8 7C11 7 11 25 14 25C17 25 17 7 20 7C23 7 23 16 26 16" stroke="var(--violet)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>SignalSense</span>
    </div>
  </div>

  <main class="main" id="mainCol">
    <div class="suggestions" id="suggestions">
      <div class="suggestion-chip" data-q="Explain convolution intuitively">Explain convolution intuitively</div>
      <div class="suggestion-chip" data-q="Show me a square wave and its Fourier series">Square wave → Fourier series</div>
      <div class="suggestion-chip" data-q="What happens when I sample a signal too slowly?">Why does aliasing happen?</div>
    </div>

    <div class="thread" id="thread"></div>
  </main>

</div>

<div class="composer-dock">
  <div class="composer">
    <div class="pref-row" id="prefRow">
      <div class="pref-pill active" data-pref="notes">
        <span class="check"><svg viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        Notes
      </div>
      <div class="pref-pill active" data-pref="explanation">
        <span class="check"><svg viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        Explanation
      </div>
      <div class="pref-pill" data-pref="visualization">
        <span class="check"><svg viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        Visualization
      </div>
    </div>
    <div class="input-shell">
      <textarea id="composerInput" placeholder="Ask SignalSense anything…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
    </div>
    <div class="composer-foot">SignalSense can simplify — always verify against your course material.</div>
  </div>
</div>

<script>
/* ================= Fluid Canvas Art ================= */
(function(){
  const canvas = document.getElementById('fluidCanvas');
  const ctx = canvas.getContext('2d');
  let w,h,dpr;

  function resize(){
    dpr = Math.min(window.devicePixelRatio||1, 2);
    w = canvas.clientWidth;
    h = canvas.clientHeight;
    canvas.width = w*dpr;
    canvas.height = h*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    if(!running) drawFrame(lastT);
  }
  window.addEventListener('resize', resize);

  function isDark(){ return document.documentElement.getAttribute('data-theme')==='dark'; }

  // Palette blobs - soft, premium, layered, but clearly visible
  function palette(){
    if(isDark()){
      return [
        {c:'rgba(155,134,196,0.40)'}, // violet
        {c:'rgba(143,179,204,0.32)'}, // blue
        {c:'rgba(91,74,117,0.45)'},   // deep violet
        {c:'rgba(190,170,228,0.28)'}, // lavender light
      ];
    }
    return [
      {c:'rgba(132,98,172,0.72)'},   // violet, deeper + more saturated
      {c:'rgba(102,154,190,0.68)'},  // blue, deeper
      {c:'rgba(196,168,224,0.80)'},  // lavender, still light but punchier
      {c:'rgba(90,66,128,0.55)'},    // deep violet, real weight now
    ];
  }

  const blobs = [];
  const N = 5;
  for(let i=0;i<N;i++){
    blobs.push({
      // base position as fraction of canvas
      bx: 0.2 + Math.random()*0.6,
      by: 0.3 + Math.random()*0.4,
      rx: 0.38 + Math.random()*0.20,
      ry: 0.30 + Math.random()*0.16,
      speed: 0.06 + Math.random()*0.06,
      phase: Math.random()*Math.PI*2,
      driftX: 0.14 + Math.random()*0.10,
      driftY: 0.10 + Math.random()*0.08,
      colorIdx: i % 4,
      rot: Math.random()*Math.PI
    });
  }

  // wave modulation params (signal -> art)
  let waveAmp = 1;
  let t0 = performance.now();
  let running = true;
  let lastT = 0;

  // Cursor companions: a small constellation of particles trailing the pointer,
  // sampled from a short position-history buffer so each particle naturally
  // lags by a different amount (comet-tail effect) instead of fighting one target.
  let pointerActive = false;
  const POINTER_HISTORY_LEN = 26;
  const pointerHistory = []; // newest at index 0

  const PARTICLES = [
    { sample: 1,  baseR: 0.150, colorIdx: 0, pulseSpeed: 0.9,  pulsePhase: 0.0 },
    { sample: 4,  baseR: 0.105, colorIdx: 1, pulseSpeed: 1.1,  pulsePhase: 1.3 },
    { sample: 8,  baseR: 0.080, colorIdx: 2, pulseSpeed: 0.8,  pulsePhase: 2.6 },
    { sample: 13, baseR: 0.058, colorIdx: 3, pulseSpeed: 1.3,  pulsePhase: 0.7 },
    { sample: 18, baseR: 0.040, colorIdx: 0, pulseSpeed: 1.0,  pulsePhase: 3.4 },
    { sample: 24, baseR: 0.026, colorIdx: 1, pulseSpeed: 1.2,  pulsePhase: 4.1 },
  ];

  canvas.addEventListener('mousemove', (e)=>{
    const rect = canvas.getBoundingClientRect();
    if(rect.width === 0 || rect.height === 0) return;
    pointerActive = true;
    pointerHistory.unshift({
      fx: (e.clientX - rect.left) / rect.width,
      fy: (e.clientY - rect.top) / rect.height
    });
    if(pointerHistory.length > POINTER_HISTORY_LEN) pointerHistory.length = POINTER_HISTORY_LEN;
  });
  canvas.addEventListener('mouseleave', ()=>{
    pointerActive = false;
  });

  function drawFrame(t){
    lastT = t;
    ctx.clearRect(0,0,w,h);

    const pal = palette();

    // base wash
    const grad = ctx.createLinearGradient(0,0,w,h);
    if(isDark()){
      grad.addColorStop(0,'#19162380');
      grad.addColorStop(1,'#15131D80');
    } else {
      grad.addColorStop(0,'#FBF9F680');
      grad.addColorStop(1,'#F3EDE580');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,w,h);

    ctx.globalCompositeOperation = 'source-over';

    blobs.forEach((b,i)=>{
      const ang = t*b.speed + b.phase;
      // signal-wave inspired motion: superposition of two sines
      const x = (b.bx + Math.sin(ang)*b.driftX + Math.sin(ang*1.7)*b.driftX*0.25) * w;
      const y = (b.by + Math.cos(ang*0.8)*b.driftY + Math.sin(ang*2.1)*b.driftY*0.2) * h;
      const rx = (b.rx + Math.sin(ang*1.3)*0.03) * w;
      const ry = (b.ry + Math.cos(ang*1.1)*0.03) * h;

      const grd = ctx.createRadialGradient(x,y,0, x,y, Math.max(rx,ry));
      const col = pal[b.colorIdx].c;
      grd.addColorStop(0, col);
      grd.addColorStop(1, col.replace(/[\d.]+\)$/, '0)'));

      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(b.rot + Math.sin(ang*0.5)*0.3);
      ctx.scale(rx/Math.max(rx,ry), ry/Math.max(rx,ry));
      ctx.translate(-x,-y);
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(x,y,Math.max(rx,ry),0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    });

    // ===== Cursor companions =====
    // A small constellation of particles, each sampling a different depth in
    // the pointer's recent path. Because they read different points in history
    // rather than all chasing the live position, they naturally stagger into
    // a comet-tail instead of stretching or fighting each other.
    if(pointerActive && pointerHistory.length > 2){
      const maxR = Math.min(w,h);

      // subordinate trace: a thin line connecting the recent path, fading
      // out quickly with age so it reads as a whisper, not a second animation
      ctx.beginPath();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for(let k=0;k<pointerHistory.length;k++){
        const p = pointerHistory[k];
        const px = p.fx*w, py = p.fy*h;
        if(k===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.strokeStyle = isDark() ? 'rgba(214,198,236,0.20)' : 'rgba(91,74,117,0.16)';
      ctx.lineWidth = 1.4;
      ctx.stroke();

      PARTICLES.forEach((p)=>{
        const idx = Math.min(p.sample, pointerHistory.length-1);
        const sampled = pointerHistory[idx];
        // ease toward the sampled history point for extra liquid smoothing
        if(p._x === undefined){ p._x = sampled.fx*w; p._y = sampled.fy*h; }
        p._x += (sampled.fx*w - p._x) * 0.35;
        p._y += (sampled.fy*h - p._y) * 0.35;

        const pulse = 1 + Math.sin(t*p.pulseSpeed + p.pulsePhase) * 0.12;
        const r = maxR * p.baseR * pulse;
        const fade = 1 - (idx / POINTER_HISTORY_LEN) * 0.55; // gently dims toward the tail

        const grd = ctx.createRadialGradient(p._x,p._y,0, p._x,p._y, r);
        const col = pal[p.colorIdx].c;
        const dimmed = col.replace(/[\d.]+\)$/, m => (parseFloat(m)*fade).toFixed(3)+')');
        grd.addColorStop(0, dimmed);
        grd.addColorStop(1, col.replace(/[\d.]+\)$/, '0)'));

        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(p._x,p._y,r,0,Math.PI*2);
        ctx.fill();
      });
    }

    ctx.globalCompositeOperation = 'source-over';

    // visible waveform line sweeping through, like a signal trace
    ctx.beginPath();
    const lineY = h*0.55;
    const amp = h*0.05;
    ctx.lineWidth = 2.2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = isDark() ? 'rgba(239,234,246,0.38)' : 'rgba(58,46,82,0.32)';
    for(let x=0;x<=w;x+=4){
      const yy = lineY + Math.sin(x*0.012 + t*0.6)*amp + Math.sin(x*0.025 - t*0.4)*amp*0.4;
      if(x===0) ctx.moveTo(x,yy); else ctx.lineTo(x,yy);
    }
    ctx.stroke();
  }

  function draw(now){
    if(!running) return;
    drawFrame((now - t0)/1000);
    requestAnimationFrame(draw);
  }

  resize();
  requestAnimationFrame(draw);

  window.__fluidResize = resize;
  window.__fluidFreeze = function(){
    running = false;
  };
  window.__fluidResume = function(){
    if(running) return;
    running = true;
    t0 = performance.now() - lastT*1000;
    requestAnimationFrame(draw);
  };
})();

/* ================= Theme toggle ================= */
const themeToggle = document.getElementById('themeToggle');
const root = document.documentElement;
themeToggle.addEventListener('click', ()=>{
  const isDark = root.getAttribute('data-theme')==='dark';
  root.setAttribute('data-theme', isDark? 'light':'dark');
});

/* ================= Preference pills ================= */
const prefRow = document.getElementById('prefRow');
const activePrefs = new Set(['notes','explanation']);
prefRow.querySelectorAll('.pref-pill').forEach(pill=>{
  pill.addEventListener('click', ()=>{
    const key = pill.dataset.pref;
    pill.classList.toggle('active');
    if(pill.classList.contains('active')) activePrefs.add(key); else activePrefs.delete(key);
  });
});

/* ================= Hero collapse logic ================= */
const appShell = document.getElementById('appShell');
const heroWrap = document.getElementById('heroWrap');
const suggestions = document.getElementById('suggestions');
let hasInteracted = false;

function collapseHero(){
  if(hasInteracted) return;
  hasInteracted = true;
  appShell.classList.add('chat-active');
  heroWrap.classList.add('shrunk');
  suggestions.style.display = 'none';
  setTimeout(()=>{
    if(window.__fluidResize) window.__fluidResize();
    if(window.__fluidFreeze) window.__fluidFreeze();
  }, 1150);
}

/* ================= Chat logic ================= */
const thread = document.getElementById('thread');
const input = document.getElementById('composerInput');
const sendBtn = document.getElementById('sendBtn');

input.addEventListener('input', ()=>{
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160)+'px';
});
input.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    handleSend();
  }
});
sendBtn.addEventListener('click', handleSend);

suggestions.querySelectorAll('.suggestion-chip').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    input.value = chip.dataset.q;
    handleSend();
  });
});

function escapeHtml(s){
  return s.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

async function handleSend(){
  const text = input.value.trim();
  if(!text) return;
  collapseHero();

  const userMsg = document.createElement('div');
  userMsg.className = 'msg user';
  userMsg.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  thread.appendChild(userMsg);

  input.value='';
  input.style.height='auto';
  window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});

  const typingMsg = document.createElement('div');
  typingMsg.className = 'msg assistant';
  typingMsg.innerHTML = `
    <div class="assistant-label">
      <svg viewBox="0 0 32 32" fill="none"><path d="M2 16C5 16 5 7 8 7C11 7 11 25 14 25C17 25 17 7 20 7C23 7 23 16 26 16" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      SignalSense
    </div>
    <div class="typing"><span></span><span></span><span></span></div>
  `;
  thread.appendChild(typingMsg);
  window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});

  // setTimeout(()=>{
  //   renderAssistantResponse(typingMsg, text);
  // }, 1000 + Math.random()*500);
  try {
    const response = await fetch("http://127.0.0.1:8000/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: text,
            modes: Array.from(activePrefs)
        })
    });

    const data = await response.json();

    renderAssistantResponse(typingMsg, data.response);

} catch(error) {
    console.error(error);
}
}

function renderAssistantResponse(container, query){

  container.innerHTML = `
    <div class="assistant-label">
        SignalSense
          </div>
            <div class="assistant-body">
                <p>${query}</p>
                  </div>
                  `;

return;

  const wantsViz = activePrefs.has('visualization');
  const wantsNotes = activePrefs.has('notes');
  const wantsExpl = activePrefs.has('explanation');

  let body = '';

  if(wantsExpl){
    body += `<p>Think of <span class="eq">convolution</span> as one signal sliding across another, asking at every instant: "how much do these two shapes agree right now?" That running tally of agreement — sample by sample — is the convolved output.</p>
    <p>Formally, for discrete signals it's written as a weighted sum, but the intuition that survives every exam is simpler: flip, slide, multiply, add.</p>`;
  }

  if(wantsNotes){
    body += `<div class="section-tag">Key notes</div>
    <p>Convolution is commutative and associative — order doesn't matter. It's the operation behind filtering: a system's impulse response, convolved with any input, predicts the output. In the frequency domain, convolution in time becomes simple multiplication — this is why engineers love the Fourier transform.</p>`;
  }

  container.innerHTML = `
    <div class="assistant-label">
      <svg viewBox="0 0 32 32" fill="none"><path d="M2 16C5 16 5 7 8 7C11 7 11 25 14 25C17 25 17 7 20 7C23 7 23 16 26 16" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      SignalSense
    </div>
    <div class="assistant-body">${body}</div>
  `;

  if(wantsViz){
    const pg = document.createElement('div');
    pg.className = 'playground';
    pg.innerHTML = `
      <div class="playground-head">
        <div class="playground-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 12c2-5 4-5 6 0s4 5 6 0 4-5 6 0"/></svg>
          Signal Playground
        </div>
        <div class="playground-sub">interactive exploration</div>
      </div>
      <div class="pg-grid">
        <div class="pg-panel">
          <div class="pg-panel-label"><span class="dot"></span>Original Signal</div>
          <canvas class="sig-canvas" data-type="original"></canvas>
        </div>
        <div class="pg-panel">
          <div class="pg-panel-label"><span class="dot blue"></span>Modified Signal</div>
          <canvas class="sig-canvas" data-type="modified"></canvas>
        </div>
        <div class="pg-transform">
          <div class="pg-transform-eq">y(t) = (f * g)(t) = ∫ f(τ) g(t − τ) dτ</div>
        </div>
        <div class="pg-intuition">
          <div class="pg-intuition-label">Key Intuition</div>
          <div class="pg-intuition-text">As the second signal slides past the first, the overlapping area at each position becomes one point of the output. Wider overlap, taller output — this is why convolution naturally "smooths" sharp signals.</div>
        </div>
      </div>
    `;
    container.parentElement.appendChild(pg);
    requestAnimationFrame(()=>drawSignalCanvases(pg));
  }

  window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});
}

function drawSignalCanvases(scope){
  scope.querySelectorAll('.sig-canvas').forEach(cv=>{
    const dpr = Math.min(window.devicePixelRatio||1,2);
    const w = cv.clientWidth, h = cv.clientHeight;
    cv.width = w*dpr; cv.height = h*dpr;
    const ctx = cv.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    const isOriginal = cv.dataset.type==='original';
    const styles = getComputedStyle(document.documentElement);
    const violet = styles.getPropertyValue('--violet').trim();
    const blue = styles.getPropertyValue('--blue').trim();

    ctx.lineWidth = 2;
    ctx.strokeStyle = isOriginal ? violet : blue;
    ctx.beginPath();
    for(let x=0;x<=w;x+=2){
      const f = x/w;
      let y;
      if(isOriginal){
        y = h/2 + Math.sin(f*Math.PI*4)*h*0.28*Math.exp(-Math.pow(f-0.5,2)*6);
      } else {
        y = h/2 + Math.sin(f*Math.PI*4 + 1.2)*h*0.22*Math.exp(-Math.pow(f-0.6,2)*5) + Math.sin(f*Math.PI*9)*h*0.06;
      }
      if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
  });
}

window.addEventListener('resize', ()=>{
  document.querySelectorAll('.playground').forEach(pg=>drawSignalCanvases(pg));
});
</script>
